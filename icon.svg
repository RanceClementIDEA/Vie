<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" filter="url(#dropShadow)" />

  <!-- Segmented/Dashed Progress Ring matching the style in the generated image -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="rgba(255, 255, 255, 0.25)" stroke-width="14" stroke-dasharray="60 15 40 15 50 20 80 25" stroke-linecap="round" transform="rotate(-45 256 256)" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-dasharray="120 440 200 240" stroke-linecap="round" transform="rotate(-45 256 256)" opacity="0.9" />

  <!-- Centered Horizontal/Diagonal Leaf & Slash representation -->
  <g transform="rotate(-35 256 256)">
    <!-- Stylized horizontal leaf shape -->
    <path d="M130 256 C130 200, 256 180, 382 256 C256 332, 130 312, 130 256 Z" fill="url(#leafGrad)" opacity="0.95" />
    <!-- Center vein / diagonal line -->
    <line x1="120" y1="256" x2="392" y2="256" stroke="#4F46E5" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>
